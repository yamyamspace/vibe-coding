<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodBook - 오늘의 기분에 어울리는 책</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-texture"></div>
    <div class="container">
        <header>
            <h1>MoodBook Portal</h1>
            <p class="subtitle">나의 독서 생활을 위한 첫 걸음</p>
        </header>

        <section class="search-section">
            <div class="search-container">
                <input type="text" id="main-search" placeholder="책 제목, 저자 또는 키워드 검색..." autocomplete="off">
                <div class="search-icon">🔍</div>
            </div>
        </section>

        <section class="shortcut-section">
            <h2>빠른 가기</h2>
            <div class="shortcut-grid" id="shortcut-grid">
                <!-- Shortcuts will be injected here via JS -->
            </div>
        </section>

        <section class="mood-section">
            <h2>기분별 추천</h2>
            <div class="mood-selector">
                <button class="mood-btn" data-mood="happy">😊 행복함</button>
                <button class="mood-btn" data-mood="sad">😢 위로가 필요함</button>
                <button class="mood-btn" data-mood="adventurous">🚀 모험을 떠나고 싶음</button>
                <button class="mood-btn" data-mood="calm">🧘‍♀️ 차분해지고 싶음</button>
                <button class="mood-btn" data-mood="productive">🔥 열정적임</button>
            </div>
        </section>

        <main id="recommendation-area">
            <!-- Recommendations will appear here -->
        </main>

        <footer>
            <p>&copy; 2026 MoodBook Dashboard. 모든 지식의 문턱을 낮춥니다.</p>
        </footer>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
